<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livre 1 – SoundBook</title>
  <link rel="stylesheet" href="style.css" />

  <!-- AdSense si besoin plus tard -->
  <!--
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXX"
    crossorigin="anonymous"></script>

<body class="book-page">

  <header class="topbar">
    <a href="index.html" class="back-link">← Accueil</a>
    <h1>Livre 1</h1>
  </header>

  <main class="content">
    <section class="card">
      <h2>Proverbe</h2>
      <p class="intro">
        Ce livre présente un proverbe, ses mots-clés, un exercice audio
        et une question finale.
      </p>
      <button class="audio-btn" data-audio="audio/proverbe1.mp3">
        Écouter : Qui vivra verra
      </button>
    </section>

    <section class="card">
      <h2>Tags</h2>
      <div class="button-row">
        <button class="audio-btn" data-audio="audio/tag1.mp3">Tag 1</button>
        <button class="audio-btn" data-audio="audio/tag2.mp3">Tag 2</button>
        <button class="audio-btn" data-audio="audio/tag3.mp3">Tag 3</button>
      </div>
    </section>

    <section class="card">
      <h2>Complétez l'exercice</h2>
      <div class="button-row">
        <button class="audio-btn" data-audio="audio/phrase1.mp3">Phrase 1</button>
        <button class="audio-btn" data-audio="audio/phrase2.mp3">Phrase 2</button>
      </div>
    </section>

    <section class="card">
      <h2>Et vous ?</h2>
      <button class="audio-btn" data-audio="audio/et-vous.mp3">
        Écouter la question
      </button>
    </section>

    <section class="card">
      <h2>Lecteur</h2>
      <audio id="audio-player" controls preload="none"></audio>
      <p id="now-playing">Aucun audio en lecture.</p>
    </section>

    <nav class="nav-books">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="livres2.html" class="nav-link">Livre suivant</a>
    </nav>

    <section class="card ad-card">
      <p class="ad-title">Publicité</p>

      <!-- Bloc pub plus tard -->
      <!--
      <ins class="adsbygoogle"
           style="display:block"

           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
      -->
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
